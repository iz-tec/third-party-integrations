name: CI — Unit Tests

on:
  push:
    branches: [ "main" ]
    paths:
      - 'integration-tns/**'
      - 'common-core/**'
      - 'common-database/**'
  pull_request:
    paths:
      - 'integration-tns/**'
      - 'common-core/**'
      - 'common-database/**'

jobs:
  unit-tests:
    name: Unit Tests (no credentials required)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run unit tests
        run: |
          mvn -pl common-core,common-database,integration-tns -am test \
            --no-transfer-progress

      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-unit
          path: '**/target/surefire-reports/'

