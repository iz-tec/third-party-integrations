spring:
  application:
    name: integration-tns

  datasource:
    url: jdbc:postgresql://localhost:5432/integrations_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    default-schema: tns

server:
  port: 8081

tns:
  base-url: ${TNS_BASE_URL:https://api.lsm-dev.tnsi.com.br}
  username: ${TNS_USERNAME:change-me}
  password: ${TNS_PASSWORD:change-me}
  token-ttl-seconds: 300
  token-refresh-before-seconds: 30
  sim-page-size: ${TNS_SIM_PAGE_SIZE:100}
  sim-max-pages: ${TNS_SIM_MAX_PAGES:10}

